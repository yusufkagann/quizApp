<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönetici Paneli (Host)</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&display=swap" rel="stylesheet">
</head>

<body style="background-color: var(--purple);">
    <div id="admin-login-overlay"
        style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:9999; background:var(--purple); display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <div class="card" style="text-align:center; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
            <h2 style="margin-bottom:20px;">Yönetici Girişi</h2>
            <input type="password" id="admin-password-input" placeholder="Şifre"
                style="margin-bottom:15px; width:100%; box-sizing:border-box; text-align:center; font-size:1.2rem; padding:10px;">
            <button id="btn-admin-login" class="btn btn-primary btn-block">Giriş Yap</button>
        </div>
    </div>

    <div id="app"
        style="overflow-y:auto; flex-direction:row; align-items:flex-start; flex-wrap: wrap; background-color: var(--purple); display:none;">
        <div class="card" style="width: 350px; margin: 20px;">
            <h2 style="color:var(--dark); margin-bottom: 20px;">🕹️ Kontroller</h2>
            <button id="btn-start-lobby" class="btn btn-secondary btn-block"
                style="background-color: var(--red); color: white; border: none; margin-bottom:15px;">Oyunu Sıfırla &
                Lobiye Aç</button>
            <div style="border-top: 2px solid #eee; padding-top: 20px;">
                <button id="btn-start-game" class="btn btn-primary btn-block"
                    style="font-size: 1.2rem; padding: 15px;">🚀 Sınavı Başlat (Otomatik Akış)</button>
                <p style="margin-top:15px; font-size:0.9rem; color:#666;">Sınav başlatıldığında sorular adım adım
                    otomatik olarak ilerleyecektir. Her bir sorunun normal süresi 15 saniyedir ancak herkes cevap
                    verdiğinde süre beklenmeden direkt sonuç ekranına geçilir.</p>
            </div>
            <div id="question-controls" style="display:none;"></div>
        </div>
        <div style="flex:1; min-width: 300px; display:flex; flex-direction:column;">
            <div class="card" style="margin: 20px; color: var(--dark);">
                <h2>Durum: <span id="admin-status" style="color: var(--blue);">Bağlanıyor...</span></h2>
                <div id="admin-question-box"
                    style="display:none; margin-top:15px; padding:15px; background-color:#f8f9fa; border-left: 5px solid var(--blue); border-radius:5px;">
                    <h3 id="admin-question-text" style="margin-bottom:10px;">Soru</h3>
                    <ul id="admin-question-answers" style="list-style:none; padding:0; margin:0;"></ul>
                </div>
            </div>
            <div class="card" style="margin: 20px; color: var(--dark); flex:1;">
                <h3>Giren Öğrenciler (<span id="admin-player-count">0</span>)</h3>
                <div id="admin-players-list" class="players-grid" style="margin-top: 15px;"></div>
            </div>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="questions.js"></script>
    <script src="admin.js"></script>
</body>

</html>
